name: Brave Adblock Lists

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch & merge lists
        run: |
          python3 << 'EOF'
          import json, urllib.request
          catalog = json.load(urllib.request.urlopen("https://raw.githubusercontent.com/brave/adblock-resources/master/filter_lists/list_catalog.json"))
          with open("brave-adblock.txt", "w") as f:
            for item in catalog:
              if item.get("default_enabled"):
                for source in item.get("sources", []):
                  url = source.get("url")
                  if url:
                    try:
                      data = urllib.request.urlopen(url).read().decode()
                      f.write(data + "\n")
                    except: pass
          EOF
      
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brave-adblock.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update adblock lists" && git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git)
