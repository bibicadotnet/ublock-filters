name: Update Brave Adblock List

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build brave-adblock.txt
        run: |
          curl -s https://raw.githubusercontent.com/brave/adblock-resources/master/filter_lists/list_catalog.json -o catalog.json
          urls=$(jq -r '.[] | select(.default_enabled==true) | .sources[].url' catalog.json)
          echo "=== default_enabled=true URLs ==="
          echo "$urls"
          echo "================================="
          > brave-adblock.txt
          for u in $urls; do
            echo ">> Tải: $u"
            if curl -fsSL --retry 3 "$u" >> brave-adblock.txt; then
              echo "" >> brave-adblock.txt
            else
              echo "!!! LỖI tải: $u (bỏ qua, không ghi vào file)"
            fi
          done
          echo "Tổng số dòng trong brave-adblock.txt: $(wc -l < brave-adblock.txt)"
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add brave-adblock.txt
          git diff --cached --quiet || git commit -m "Update brave-adblock.txt"
          git push
