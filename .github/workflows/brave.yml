name: Brave Adblock Lists

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch & merge lists
        run: |
          python3 << 'EOF'
          import json, urllib.request
          catalog = json.load(urllib.request.urlopen("https://raw.githubusercontent.com/brave/adblock-resources/master/filter_lists/list_catalog.json"))
          with open("brave-adblock.txt", "w") as f:
            for item in catalog:
              if item.get("default_enabled"):
                try:
                  data = urllib.request.urlopen(item["url"]).read().decode()
                  f.write(data + "\n")
                except: pass
          EOF
      
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add brave-adblock.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update adblock lists" && git push)
