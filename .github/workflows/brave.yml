name: Brave Adblock Lists

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch & merge lists
        run: |
          curl -s https://raw.githubusercontent.com/brave/adblock-resources/master/filter_lists/list_catalog.json | \
          jq -r '.[] | select(.default_enabled == true) | .url' | \
          while read url; do curl -s "$url"; echo; done > brave-adblock.txt
      
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add brave-adblock.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update adblock lists" && git push)
